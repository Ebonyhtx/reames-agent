version: 2
project_name: reames-agent

before:
  hooks:
    - go mod download

builds:
  - id: reames-agent
    main: ./cmd/reames-agent
    binary: reames-agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: reames-agent
    ids: [reames-agent]
    name_template: "reames-agent-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE.md
      - third_party/go-tuf/LICENSE
      - third_party/go-tuf/NOTICE

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

release:
  prerelease: auto
  make_latest: false
  name_template: "Reames Agent CLI {{ .Tag }}"
