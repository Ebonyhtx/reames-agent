version: 2
project_name: reames-agent

before:
  hooks:
    - go mod download

builds:
  - id: reames-agent
    main: ./cmd/reames-agent
    binary: reames-agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: reames-agent
    ids: [reames-agent]
    name_template: "reames-agent-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

homebrew_casks:
  - name: reames-agent
    ids: [reames-agent]
    # Prereleases (v*-rc*) must not update the stable tap; brew has no separate
    # prerelease channel, so a pushed rc cask becomes the default `brew install`.
    # npm is a separate line (release-npm.yml, `npm-v*`), so an npm prerelease no
    # longer drags brew along — a stable `v*` cask can ship while npm stays on rc.
    skip_upload: "auto"
    repository:
      owner: esengine
      name: homebrew-reames-agent
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/reames-agent/reames-agent"
    description: "Cache-first DeepSeek coding agent for the terminal."
    commit_author:
      name: reames-agent
      email: reames-agent@deepseek.com
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/reames-agent"]
          end

release:
  prerelease: auto
  make_latest: false
  name_template: "Reames Agent CLI {{ .Tag }}"
