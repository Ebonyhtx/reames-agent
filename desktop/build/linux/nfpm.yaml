# nfpm config for the Linux .deb package. scripts/desktop-build.sh's linux branch
# runs `nfpm package` after `wails build`, from the desktop/ dir (so the src paths
# below are relative to desktop/). The .deb is a human-download artifact only — like
# the macOS .dmg — so the Linux updater channel stays the .tar.gz and cmd/sign's
# manifest skips .deb files.
#
# $DEB_VERSION and $DEB_ARCH are exported by desktop-build.sh. DEB_VERSION is the tag
# minus a leading "v" and any prerelease suffix (a strict X.Y.Z that dpkg accepts);
# DEB_ARCH is the Go arch name, which already matches Debian's (amd64, arm64).
name: "reames-agent-desktop"
arch: "${DEB_ARCH}"
platform: "linux"
version: "${DEB_VERSION}"
section: "utils"
priority: "optional"
maintainer: "Reames Agent Contributors"
description: |
  Reames Agent desktop — a Wails shell around the Go kernel.
vendor: "Reames Agent Contributors"
homepage: "https://github.com/Ebonyhtx/reames-agent"
license: "MIT"
# Runtime libraries the WebKitGTK 4.1 build links against (-tags webkit2_41); apt
# pulls them in on install. These package names ship from Ubuntu 22.04 / Debian 12 on.
depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0
contents:
  - src: ./build/bin/reames-agent-desktop
    dst: /usr/bin/reames-agent-desktop
    file_info:
      mode: 0755
  - src: ./build/bin/reames-agent-guard
    dst: /usr/bin/reames-agent-guard
    file_info:
      mode: 0755
  - src: ./build/linux/reames-agent.desktop
    dst: /usr/share/applications/reames-agent.desktop
    file_info:
      mode: 0644
  - src: ../LICENSE
    dst: /usr/share/doc/reames-agent-desktop/LICENSE
    file_info:
      mode: 0644
  - src: ../NOTICE.md
    dst: /usr/share/doc/reames-agent-desktop/NOTICE.md
    file_info:
      mode: 0644
  - src: ../third_party/go-tuf/LICENSE
    dst: /usr/share/doc/reames-agent-desktop/go-tuf/LICENSE
    file_info:
      mode: 0644
  - src: ../third_party/go-tuf/NOTICE
    dst: /usr/share/doc/reames-agent-desktop/go-tuf/NOTICE
    file_info:
      mode: 0644
  # appicon.png is 1024x1024 — not a standard hicolor size dir, so install it under
  # the size-agnostic pixmaps path that the .desktop's `Icon=reames-agent-desktop` finds.
  - src: ./build/appicon.png
    dst: /usr/share/pixmaps/reames-agent-desktop.png
    file_info:
      mode: 0644
  - src: ./build/linux/icons/hicolor/16x16/apps/reames-agent-desktop.png
    dst: /usr/share/icons/hicolor/16x16/apps/reames-agent-desktop.png
    file_info:
      mode: 0644
  - src: ./build/linux/icons/hicolor/24x24/apps/reames-agent-desktop.png
    dst: /usr/share/icons/hicolor/24x24/apps/reames-agent-desktop.png
    file_info:
      mode: 0644
  - src: ./build/linux/icons/hicolor/32x32/apps/reames-agent-desktop.png
    dst: /usr/share/icons/hicolor/32x32/apps/reames-agent-desktop.png
    file_info:
      mode: 0644
  - src: ./build/linux/icons/hicolor/48x48/apps/reames-agent-desktop.png
    dst: /usr/share/icons/hicolor/48x48/apps/reames-agent-desktop.png
    file_info:
      mode: 0644
  - src: ./build/linux/icons/hicolor/64x64/apps/reames-agent-desktop.png
    dst: /usr/share/icons/hicolor/64x64/apps/reames-agent-desktop.png
    file_info:
      mode: 0644
  - src: ./build/linux/icons/hicolor/128x128/apps/reames-agent-desktop.png
    dst: /usr/share/icons/hicolor/128x128/apps/reames-agent-desktop.png
    file_info:
      mode: 0644
  - src: ./build/linux/icons/hicolor/256x256/apps/reames-agent-desktop.png
    dst: /usr/share/icons/hicolor/256x256/apps/reames-agent-desktop.png
    file_info:
      mode: 0644
  - src: ./build/linux/icons/hicolor/512x512/apps/reames-agent-desktop.png
    dst: /usr/share/icons/hicolor/512x512/apps/reames-agent-desktop.png
    file_info:
      mode: 0644
  - src: ./build/linux/icons/hicolor/scalable/apps/reames-agent-desktop.svg
    dst: /usr/share/icons/hicolor/scalable/apps/reames-agent-desktop.svg
    file_info:
      mode: 0644
