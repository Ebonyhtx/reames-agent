services:
  reames-agent:
    build: .
    image: reames-agent:latest
    container_name: reames-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - reames_data:/root/.reames-agent
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - REAMES_AGENT_SERVE_TOKEN=${REAMES_AGENT_SERVE_TOKEN:-}
      - REAMES_AGENT_HOME=/root/.reames-agent
    healthcheck:
      test: ["CMD", "/reames-agent", "serve", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  reames_data:
