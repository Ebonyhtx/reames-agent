version: 2
# Temporarily paused while the repository is being consolidated from the
# Reasonix-derived baseline into Reames Agent. Set each
# open-pull-requests-limit back to a positive value after the dependency update
# policy is re-established.
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      go:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "gomod"
    directory: "/desktop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      go:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/desktop/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      npm:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      npm:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      actions:
        patterns: ["*"]
