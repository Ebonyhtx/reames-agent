name: Desktop candidate

# This workflow builds inspectable native Desktop artifacts on native runners.
# It uploads short-lived artifacts only: no GitHub Release, updater metadata,
# npm/Homebrew publish, signing service, or cloud bucket write is performed here.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop-candidate:
    name: Desktop candidate (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            artifact: linux-amd64
          - platform: windows/amd64
            runner: windows-latest
            artifact: windows-amd64
          - platform: darwin/universal
            runner: macos-latest
            artifact: darwin-universal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: |
            go.sum
            desktop/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: desktop/frontend/pnpm-lock.yaml

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev dbus-x11 xvfb xdotool

      - name: Install macOS packaging dependencies
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsis = "C:\Program Files (x86)\NSIS"
          $env:Path = "$nsis;$env:Path"
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          makensis -VERSION

      - name: Install Wails and packaging tools
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          if [ "${{ runner.os }}" = "Linux" ]; then
            go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          fi

      - name: Build desktop candidate
        shell: bash
        run: bash scripts/desktop-build.sh "${{ matrix.platform }}" "v0.1.0-candidate.${{ github.run_number }}" candidate

      - name: Smoke installed Linux candidate
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo dpkg -i "dist/Reames Agent-linux-amd64.deb"
          test -x /usr/bin/reames-agent-desktop
          test -f /usr/share/applications/reames-agent.desktop
          test -f /usr/share/pixmaps/reames-agent-desktop.png
          mkdir -p artifacts
          dbus-run-session -- xvfb-run -a -s "-screen 0 1280x800x24" \
            python3 scripts/smoke_desktop_candidate.py \
              --platform linux \
              --artifact "dist/Reames Agent-linux-amd64.deb" \
              --exe /usr/bin/reames-agent-desktop \
              --out artifacts/desktop-linux-native-smoke.json

      - name: Smoke installed macOS candidate
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          dmg="dist/Reames Agent-darwin-universal.dmg"
          mount_dir="$RUNNER_TEMP/reames-agent-dmg"
          install_root="$RUNNER_TEMP/Applications"
          app="$install_root/Reames Agent.app"
          mkdir -p "$mount_dir" "$install_root" artifacts
          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"
          trap 'hdiutil detach "$mount_dir" || true' EXIT
          ditto "$mount_dir/Reames Agent.app" "$app"
          hdiutil detach "$mount_dir"
          trap - EXIT
          codesign --verify --deep --strict "$app"
          lipo -verify_arch x86_64 arm64 "$app/Contents/MacOS/reames-agent-desktop"
          python3 scripts/smoke_desktop_candidate.py \
            --platform darwin \
            --artifact "$dmg" \
            --exe "$app/Contents/MacOS/reames-agent-desktop" \
            --out artifacts/desktop-darwin-native-smoke.json

      - name: Smoke Windows candidate
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          python scripts/smoke_desktop_native.py `
            --exe desktop/build/bin/reames-agent-desktop.exe `
            --out artifacts/desktop-windows-native-smoke.json

      - name: Upload desktop candidate artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reames-agent-desktop-candidate-${{ matrix.artifact }}-${{ github.sha }}
          path: |
            dist/*
            artifacts/desktop-*-native-smoke.json
          if-no-files-found: error
          retention-days: 14
