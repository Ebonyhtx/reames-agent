name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Core Go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./internal/... -count=1 -timeout 300s

  desktop-go:
    name: Desktop Go
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.sum
      - name: Test desktop module
        working-directory: desktop
        run: go test . -count=1 -timeout 300s

  desktop-frontend:
    name: Desktop frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: desktop/frontend/pnpm-lock.yaml
      - name: Install locked dependencies
        working-directory: desktop/frontend
        run: pnpm install --frozen-lockfile
      - name: Test
        working-directory: desktop/frontend
        run: pnpm test:all
      - name: Build
        working-directory: desktop/frontend
        run: pnpm build

  upstream-watch-contracts:
    name: Upstream watch contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test report and decision logic
        run: python -m unittest scripts.test_check_upstreams -v
      - name: Test issue reconciliation
        run: node scripts/test_upstream_watch_issue.mjs

  deployment-contracts:
    name: Deployment contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate server deployment contracts
        run: python scripts/check_deploy_contracts.py
      - name: Validate Unix installer dry-run
        run: |
          python -m unittest scripts.test_installers.InstallerDryRunTests.test_unix_gateway_dry_run_preserves_home_and_credential_boundary -v
          python -m unittest scripts.test_installers.InstallerDryRunTests.test_unix_release_dry_run_verifies_checksum -v
      - name: Validate PowerShell installer dry-run
        shell: pwsh
        run: |
          python -m unittest scripts.test_installers.InstallerDryRunTests.test_powershell_gateway_dry_run_preserves_home_and_credential_boundary -v
          python -m unittest scripts.test_installers.InstallerDryRunTests.test_powershell_release_dry_run_verifies_checksum -v
      - name: Smoke headless Gateway deployment
        run: python scripts/smoke_gateway_headless.py --out artifacts/headless-gateway-smoke.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: headless-gateway-smoke
          path: artifacts/headless-gateway-smoke.json
          if-no-files-found: error

  release-contracts:
    name: Release contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate release safety contracts
        run: python scripts/check_release_contracts.py
      - name: Test desktop artifact checker
        run: python -m unittest scripts.test_check_desktop_artifacts -v

  public-readiness:
    name: Public readiness and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate documentation contracts
        run: python scripts/check_docs_contracts.py
      - name: Validate public repository gates
        run: python scripts/check_public_readiness.py

  cross:
    name: Cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Cross-compile
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bin/reames-agent-linux-amd64 ./cmd/reames-agent
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bin/reames-agent-linux-arm64 ./cmd/reames-agent
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o bin/reames-agent-darwin-amd64 ./cmd/reames-agent
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o bin/reames-agent-darwin-arm64 ./cmd/reames-agent
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o bin/reames-agent-windows-amd64.exe ./cmd/reames-agent
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -o bin/reames-agent-windows-arm64.exe ./cmd/reames-agent
          echo "All 6 cross-compile targets built"
