name: Upstream watch

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate upstream advisory report
        run: python scripts/check_upstreams.py --out-dir artifacts/upstream-watch

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: upstream-watch-report
          path: artifacts/upstream-watch/

      - name: Open advisory issue when upstream changed
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('artifacts/upstream-watch/upstream-report.json', 'utf8'));
            if (!report.changed_count) {
              core.info('No upstream changes detected.');
              return;
            }
            const marker = '<!-- reames-agent-upstream-watch -->';
            const title = `Upstream watch: ${report.changed_count} reference project(s) changed`;
            const md = fs.readFileSync('artifacts/upstream-watch/upstream-report.md', 'utf8');
            const body = `${marker}\n\n${md}\n\nThis is advisory-only. Do not auto-merge upstream code; review and stage changes through the Reames Agent execution plan.`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-watch',
              per_page: 20,
            });
            const existing = issues.find(issue => (issue.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
              });
              core.info(`Updated issue #${existing.number}`);
              return;
            }

            let labels = ['upstream-watch'];
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'upstream-watch',
                color: '6f42c1',
                description: 'Reference upstream changed; advisory review needed',
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });
            core.info(`Created issue #${created.data.number}`);
