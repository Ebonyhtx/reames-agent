name: Upstream watch

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Generate upstream advisory report
        run: python scripts/check_upstreams.py --out-dir artifacts/upstream-watch

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: upstream-watch-report
          path: artifacts/upstream-watch/

      - name: Reconcile upstream advisory issue
        uses: actions/github-script@v9
        with:
          script: |
            const reconcile = require('./.github/scripts/upstream-watch-issue.js');
            await reconcile({
              github,
              context,
              core,
              reportPath: 'artifacts/upstream-watch/upstream-report.json',
              markdownPath: 'artifacts/upstream-watch/upstream-report.md',
            });
